version: "3.9"

x-biggie-common:
  &biggie-common
  environment:
    &biggie-common-env
    MONGODB_URI: "${MONGODB_URI}"
    DB_NAME: "${DB_NAME}"
  volumes:
    - "${VOLUME_MOUNT}"

services:

  nginx:
    image: nginx
    container_name: biggie_nginx
    volumes:
      - ./conf/nginx/docker_base.conf:/etc/nginx/nginx.conf:ro
      - ./conf/nginx/certificate.conf:/etc/nginx/certificate.conf:ro
      - ./logs/nginx:/var/log/nginx
      - ./conf/nginx/app_docker.conf:/etc/nginx/sites-enabled/app_docker.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro  # certificate of the host machine
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api_prod
    profiles:
      - live_prod

  api_test:
    container_name: biggie_api_test
    image: "ghcr.io/pierrz/biggie_api_img:latest"
#    image: api_biggie_img
#    build:
#      context: .
#      dockerfile: api/Dockerfile
    environment:
      <<: *biggie-common-env
    command: pytest -v
    depends_on:
      - mongo
    profiles:
      - test

  api_prod:
    <<: *biggie-common
    container_name: biggie_api_prod
    image: "ghcr.io/pierrz/biggie_api_img:latest"
#    image: api_biggie_img
    command: uvicorn main:app --host 0.0.0.0 --reload --log-level error
    depends_on:
      - mongo
    ports:
      - "8000:8000"
    profiles:
      - api

  harvester_test:
    container_name: biggie_harvester_test
#    image: "ghcr.io/pierrz/biggie_harvester_img:latest"
    image: harvester_biggie_img
    build:
      context: .
      dockerfile: harvester/Dockerfile
    environment:
      API_PUBLIC_KEY: "${API_PUBLIC_KEY}"
      API_PRIVATE_KEY: "${API_PRIVATE_KEY}"
    volumes:
      - "${VOLUME_MOUNT}"
    command: pytest -v --asyncio-mode=strict
    profiles:
      - test

  harvester_prod:
    container_name: biggie_harvester_prod
    image: "ghcr.io/pierrz/biggie_harvester_img:latest"
#    image: harvester_biggie_img
    environment:
      API_PUBLIC_KEY: "${API_PUBLIC_KEY}"
      API_PRIVATE_KEY: "${API_PRIVATE_KEY}"
    volumes:
      - "${VOLUME_MOUNT}"
    command: python3 -m __init__
    profiles:
      - import_data

  pyspark_test:
    container_name: biggie_pyspark_test
    image: "ghcr.io/pierrz/biggie_pyspark_img:latest"
#    image: pyspark_biggie_img
#    build:
#      context: .
#      dockerfile: spark/Dockerfile
    environment:
      <<: *biggie-common-env
    depends_on:
      - mongo
    command: python3.9 -m pytest -v
    profiles:
      - test

  pyspark_prod:
    <<: *biggie-common
    container_name: biggie_pyspark_prod
    image: "ghcr.io/pierrz/biggie_pyspark_img:latest"
#    image: pyspark_biggie_img
    depends_on:
      - harvester_prod
    command: python3.9 -m __init__
    profiles:
      - import_data


  celery:
    container_name: biggie_celery
    image: celery:latest
#    build:
#      context: .
#      dockerfile: setup/celery/Dockerfile
#    image: celery_app_img
    volumes:
      - ./logs/celery:/opt/celery/logs
      - "${VOLUME_MOUNT}"
    environment:
      <<: *biggie-common-env
      CELERY_BROKER_URL: "amqp://rabbitmq:5672/"
      CELERY_RESULT_BACKEND: "rpc://rabbitmq:5672/"
#      CELERY_BROKER_URL: "${CELERY_BROKER_URL}"
#      CELERY_RESULT_BACKEND: "${CELERY_RESULT_BACKEND}"
    depends_on:
      - rabbitmq

  rabbitmq:
    container_name: biggie_rabbitmq
    image: rabbitmq:3.8-management
    restart: on-failure
    ports:
      - "5672:5672"
      - "15672:15672"
